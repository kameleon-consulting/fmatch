# .goreleaser.yaml — fmatch release configuration
# Docs: https://goreleaser.com
version: 2

project_name: fmatch

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - main: .
    binary: fmatch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # No ARM64 build for Windows (limited toolchain support)
      - goos: windows
        goarch: arm64
    ldflags:
      # Inject version and strip debug info for smaller binaries
      - -s -w -X github.com/kameleon-consulting/fmatch/cmd.Version={{.Version}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - .fmatchignore.example

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: kameleon-consulting
    name: fmatch
  draft: false
  prerelease: auto
